<!doctype html>
<html>

<head>
    <title>3D Test</title>
    <link rel="stylesheet" href="model-viewer-demo.css">
</head>

<body>
    <div id="holder">
        <div id="text">
            <h1 class="sample-text">Play around with the model on the right!</h1>
            <h1 class="sample-text">Just watch it rotate on its own or do it yourself with the mouse</h1>
            <h1 class="sample-text">You can also zoom in the model!</h1>
        </div>
        <div id="model">
            <!-- Sedona Arizona by Gabe Coyle -->
<model-viewer src="https://poly.googleusercontent.com/downloads/c/fp/1595824334858009/dSMelGtFDsj/7TxEkJo3yqw/model.gltf" ios-src="https://poly.googleusercontent.com/downloads/c/fp/1595824334858009/dSMelGtFDsj/4UbZ9UCH6qK/model.usdz" alt="Sedona Arizona by Gabe Coyle" background-color="##3388b0" camera-controls auto-rotate > </model-viewer>
        </div>
    </div>

    <!-- Loads model-viewer for modern browsers -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.js"></script>
    <!-- Loads model-viewer for older browsers -->
    <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>

</body>

</html>
